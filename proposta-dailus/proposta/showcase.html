<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vitrine Dailus · Showcase animado por cores</title>
<meta name="description" content="Vitrine animada dos produtos Dailus por paleta de cores: showcase futurista feito com as imagens reais do catálogo.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="showcase.css">
</head>
<body>

<div class="bg"><span class="blob b1"></span><span class="blob b2"></span><span class="blob b3"></span><span class="grain"></span></div>

<header class="sc-top">
  <a class="sc-logo" href="index.html"><img src="assets/dailus-logo.png" alt="Dailus"></a>
  <div class="sc-title">Vitrine <span>· showcase por cores</span></div>
  <div class="sc-links">
    <a href="explorer.html">Catálogo</a>
    <a href="index.html">← Proposta</a>
  </div>
</header>

<main class="stage" id="stage"><div class="loading" id="loading">montando a vitrine…</div></main>

<div class="progress" id="progress"><i></i></div>

<div class="hud" id="hud" hidden>
  <div class="modes" id="modes">
    <button data-mode="cores" class="on">Por cores</button>
    <button data-mode="catalogo">Catálogo</button>
    <button data-mode="paleta">Paletas</button>
  </div>
  <div class="controls">
    <button id="prev" aria-label="Anterior">‹</button>
    <button id="play" aria-label="Play/Pause">⏸</button>
    <button id="next" aria-label="Próximo">›</button>
  </div>
  <div class="dots" id="dots"></div>
</div>

<div class="palettes" id="palettes" hidden></div>

<script src="showcase.js"></script>
</body>
</html>
